<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONDER B — Tablero Estadístico</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root {
  --bg:#ffffff;
  --surface:#f8f9fa;
  --card:#ffffff;
  --border:#e5e7eb;
  --border2:#d1d5db;
  --text:#111827;
  --muted:#6b7280;
  --muted2:#9ca3af;
  --win:#16a34a;
  --loss:#dc2626;
  --c1:#2563eb; /* ataque */
  --c2:#0891b2; /* recepcion */
  --c3:#7c3aed; /* saque */
  --c4:#d97706; /* bloqueo */
  --font:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh;}

/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.logo{font-size:18px;font-weight:700;letter-spacing:-.5px;color:var(--text);}
.logo span{color:var(--muted);}
.subtitle{font-size:11px;color:var(--muted);margin-top:2px;}
.filters{display:flex;gap:6px 8px;flex-wrap:wrap;margin-left:auto;align-items:center;justify-content:flex-end;max-width:62%;}
.filter-meta{font-size:11px;color:var(--muted);font-weight:600;margin-right:2px;}
.chk{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--text);background:#fff;border:1px solid var(--border2);padding:5px 10px;border-radius:6px;cursor:pointer;user-select:none;transition:all .12s;}
.chk:hover{border-color:#6b7280;}
.chk input{cursor:pointer;accent-color:var(--text);margin:0;}
.filter-btn{background:var(--surface);border:1px solid var(--border2);color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:500;transition:all .12s;white-space:nowrap;}
.filter-btn:hover{border-color:#6b7280;color:var(--text);}
.filter-btn.active{background:var(--text);color:#fff;border-color:var(--text);font-weight:600;}

/* CONTAINER */
.container{padding:20px 28px;max-width:1440px;margin:0 auto;}

/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:24px;}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-weight:600;}
.kpi-value{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1;color:var(--text);}
.kpi-value.good{color:var(--win);}
.kpi-value.mid{color:var(--c4);}
.kpi-value.bad{color:var(--loss);}
.kpi-sub{font-size:11px;color:var(--muted2);margin-top:5px;}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border);}
.tab{padding:9px 16px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;letter-spacing:.1px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:600;}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* SECTION TITLE */
.st{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;margin-top:4px;}

/* TABLES */
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--surface);color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.6px;padding:9px 12px;text-align:right;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border);}
thead th:first-child{text-align:left;}
thead .ga{color:var(--c1);}
thead .gr{color:var(--c2);}
thead .gs{color:var(--c3);}
thead .gb{color:var(--c4);}
tbody tr{border-bottom:1px solid var(--border);transition:background .08s;}
tbody tr:hover{background:var(--surface);}
tbody tr:last-child{border-bottom:none;}
td{padding:8px 12px;text-align:right;font-size:12px;white-space:nowrap;}
td:first-child{text-align:left;}
.pn{font-weight:600;font-size:12px;color:var(--text);}
.pb{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-left:5px;border:1px solid;}
.pb-ARM{color:#7c3aed;border-color:#ddd6fe;background:#f5f3ff;}
.pb-PNT{color:#0369a1;border-color:#bae6fd;background:#f0f9ff;}
.pb-OPU{color:#b45309;border-color:#fde68a;background:#fffbeb;}
.pb-CEN{color:#15803d;border-color:#bbf7d0;background:#f0fdf4;}
.pb-LIB{color:#6b7280;border-color:#e5e7eb;background:#f9fafb;}
.ph{color:var(--win);font-weight:600;}
.pm{color:var(--c4);font-weight:600;}
.pl{color:var(--loss);font-weight:600;}
.dot{color:var(--muted2);}
.leg{font-size:10px;color:var(--muted2);margin-top:-14px;margin-bottom:16px;line-height:1.6;}

/* MATCH HEADER */
.match-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.mr{font-size:16px;font-weight:700;color:var(--text);}
.mr .win{color:var(--win);}
.mr .loss{color:var(--loss);}
.mi{font-size:11px;color:var(--muted);}
.sr{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;}
.sb{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;border:1px solid;}
.sw{color:var(--win);border-color:#bbf7d0;background:#f0fdf4;}
.sl{color:var(--loss);border-color:#fecaca;background:#fef2f2;}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:20px;}
.chart-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px 20px;}
.chart-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:14px;}
.chart-subtitle{font-size:10px;color:var(--muted2);margin-top:-10px;margin-bottom:14px;}

/* SVG charts */
svg text{font-family:var(--font);}

/* Evolution line chart */
.evo-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;}
.evo-leg-item{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:#374151;}
.evo-dot{width:16px;height:4px;border-radius:2px;flex-shrink:0;}

@media(max-width:700px){
  .header,.container{padding:12px 16px;}
  .kpi-value{font-size:22px;}
  .charts-grid{grid-template-columns:1fr;}
}
.arm-filters{display:flex;gap:24px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:14px;}
.arm-filter-group{display:flex;flex-direction:column;gap:8px;}
.arm-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}
.arm-select{font-family:var(--font);font-size:13px;padding:6px 10px;border:1px solid var(--border2);border-radius:6px;background:#fff;color:var(--text);cursor:pointer;}
.dd-checks{display:flex;gap:6px;flex-wrap:wrap;max-width:360px;}
.dd-chk{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text);background:#fff;border:1px solid var(--border2);padding:4px 8px;border-radius:6px;cursor:pointer;user-select:none;}
.dd-chk input{cursor:pointer;accent-color:var(--text);margin:0;}
</style>
</head>

function getAgg(){
  const ps=getPs(),m={};
  ps.forEach(p=>{
    p.equipo.forEach(j=>{
      const k=j.k;
      if(!m[k])m[k]={n:j.n,k,pts:0,eva_s:0,eva_n:0,st:0,se:0,sp:0,rt:0,rp_s:0,rp_n:0,rx_s:0,rx_n:0,at:0,ae:0,ab:0,ap:0,bl:0,pd:0};
      const x=m[k];
      x.pd++;x.pts+=j.pts||0;
      if(j.eva){x.eva_s+=j.eva;x.eva_n++;}
      x.st+=j.st||0;x.se+=j.se||0;x.sp+=j.sp||0;
      x.rt+=j.rt||0;
      if(j.rp!=null){x.rp_s+=j.rp;x.rp_n++;}
      if(j.rx!=null){x.rx_s+=j.rx;x.rx_n++;}
      x.at+=j.at||0;x.ae+=j.ae||0;x.ab+=j.ab||0;x.ap+=j.ap||0;x.bl+=j.bl||0;
    });
  });
  const PO={ARM:0,PNT:1,OPU:2,CEN:3,LIB:4};
  return Object.values(m).map(x=>({...x,
    eva:x.eva_n?Math.round(x.eva_s/x.eva_n*10)/10:null,
    rp:x.rp_n?Math.round(x.rp_s/x.rp_n):null,
    rx:x.rx_n?Math.round(x.rx_s/x.rx_n):null,
    af:x.at>0?Math.round(x.ap/x.at*100):null
  })).sort((a,b)=>(PO[POS[a.k]]??5)-(PO[POS[b.k]]??5));
}

  const maxV=maxOverride||Math.max(...data.map(d=>d[valueKey]||0),1);
  const axisMax=maxOverride?maxOverride:Math.ceil(maxV/10)*10||maxV;
  let s=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  for(let g=0;g<=4;g++){
    const x=padL+g/4*iW;
    const gv=Math.round(axisMax*g/4);
    s+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT+iH}" stroke="#e5e7eb" stroke-width="1"/>`;
    s+=`<text x="${x}" y="${padT+iH+14}" text-anchor="middle" font-size="9" fill="#9ca3af">${gv}${suffix}</text>`;
  }
  data.forEach((d,i)=>{
    const y=padT+i*rowH+rowH/2;
    const val=d[valueKey]||0;
    const bw=iW*val/axisMax;
    const isGood=suffix==='%'?val>=55:false;
    const isMid=suffix==='%'?val>=40&&val<55:false;
    const barColor=suffix==='%'?(isGood?'#16a34a':isMid?'#d97706':'#dc2626'):color;
    s+=`<text x="${padL-6}" y="${y+4}" text-anchor="end" font-size="11" fill="#374151" font-weight="500">${d[labelKey]}</text>`;
    s+=`<rect x="${padL}" y="${y-barH/2}" width="${Math.max(bw,2)}" height="${barH}" rx="3" fill="${barColor}" opacity="0.9"/>`;
    const lblX=bw>28?padL+bw-5:padL+bw+5;
    const anchor=bw>28?'end':'start';
    const lblFill=bw>28?'#fff':'#374151';
    s+=`<text x="${lblX}" y="${y+4}" font-size="11" text-anchor="${anchor}" fill="${lblFill}" font-weight="600">${val}${suffix}</text>`;
    if(hasExtra){
      const extraTxt = extraSuffix ? `${d[extraKey]} ${extraSuffix}` : `${d[extraKey]}`;
      s+=`<text x="${W-6}" y="${y+4}" font-size="10" text-anchor="end" fill="#9ca3af">${extraTxt}</text>`;
    }
  });
  s+=`</svg>`;
  return s;
}

// Horizontal bar chart — same as above but takes explicit width from container
function svgBarHFull(data,W,color,valueKey,labelKey,suffix,maxOverride){
  const rowPx=28;
  const H=data.length*rowPx+32;
  return svgBarH(data,W,H,color,valueKey,labelKey,suffix,maxOverride);
}

// Vertical bar chart with enough bottom padding for labels
function svgBarV(data,W,H,color,valueKey,labelKey,suffix){
  const padL=32,padR=12,padT=16,padB=48;
  const iW=W-padL-padR,iH=H-padT-padB;
  const n=data.length;
  const colW=iW/n;
  const barW=Math.min(colW*0.5,28);
  const maxV=Math.max(...data.map(d=>d[valueKey]||0),1);
  let s=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  for(let g=0;g<=4;g++){
    const y=padT+iH*(1-g/4);
    const gv=Math.round(maxV*g/4);
    s+=`<line x1="${padL}" y1="${y}" x2="${padL+iW}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    s+=`<text x="${padL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#9ca3af">${gv}</text>`;
  }
  // bottom axis line
  s+=`<line x1="${padL}" y1="${padT+iH}" x2="${padL+iW}" y2="${padT+iH}" stroke="#e5e7eb" stroke-width="1"/>`;
  data.forEach((d,i)=>{
    const x=padL+i*colW+colW/2;
    const val=d[valueKey]||0;
    const bh=iH*val/maxV;
    s+=`<rect x="${x-barW/2}" y="${padT+iH-bh}" width="${barW}" height="${Math.max(bh,0)}" rx="3" fill="${color}" opacity="0.88"/>`;
    // label: rotate if many items
    const lbl=d[labelKey];
    s+=`<text x="${x}" y="${padT+iH+14}" text-anchor="middle" font-size="10" fill="#374151" transform="rotate(-30,${x},${padT+iH+14})">${lbl}</text>`;
    if(val>0)s+=`<text x="${x}" y="${padT+iH-bh-5}" text-anchor="middle" font-size="10" fill="#374151" font-weight="600">${val}${suffix}</text>`;
  });
  s+=`</svg>`;
  return s;
}

function svgLine(series,labels,W,H){
  const padL=40,padR=20,padT=16,padB=32;
  const iW=W-padL-padR,iH=H-padT-padB;
  const allVals=series.flatMap(s=>s.data.filter(v=>v!=null));
  const rawMax=Math.max(...allVals,1);
  // Eje con marcas enteras: redondear el maximo hacia arriba a un multiplo de 4
  // (4 divisiones -> 5 marcas enteras). Para valores chicos da 4,8,12...
  const maxV=Math.max(4, Math.ceil(rawMax/4)*4);
  const n=labels.length;
  function cx(i){return padL+i/(Math.max(n-1,1))*iW;}
  function cy(v){return padT+iH-(v/maxV)*iH;}
  let s=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  for(let g=0;g<=4;g++){
    const y=padT+iH*g/4;
    const gv=Math.round(maxV*(1-g/4));
    s+=`<line x1="${padL}" y1="${y}" x2="${padL+iW}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    s+=`<text x="${padL-5}" y="${y+4}" text-anchor="end" font-size="11" fill="#9ca3af">${gv}</text>`;
  }
  s+=`<line x1="${padL}" y1="${padT+iH}" x2="${padL+iW}" y2="${padT+iH}" stroke="#e5e7eb" stroke-width="1"/>`;
  labels.forEach((l,i)=>{
    s+=`<text x="${cx(i)}" y="${padT+iH+18}" text-anchor="middle" font-size="12" fill="#6b7280">${l}</text>`;
  });
  series.forEach(sr=>{
    let points=[];
    sr.data.forEach((v,i)=>{if(v!=null)points.push([cx(i),cy(v)]);});
    if(points.length<1)return;
    if(points.length>=2){
      let aPath=`M${points[0][0]},${padT+iH}`;
      points.forEach(([x,y])=>aPath+=` L${x},${y}`);
      aPath+=` L${points[points.length-1][0]},${padT+iH} Z`;
      s+=`<path d="${aPath}" fill="${sr.color}" opacity="0.05"/>`;
      let lPath=`M${points[0][0]},${points[0][1]}`;
      points.slice(1).forEach(([x,y])=>lPath+=` L${x},${y}`);
      s+=`<path d="${lPath}" fill="none" stroke="${sr.color}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
    points.forEach(([x,y])=>{
      s+=`<circle cx="${x}" cy="${y}" r="5.5" fill="white" stroke="${sr.color}" stroke-width="2.5"/>`;
    });
  });
  s+=`</svg>`;
  return s;
}

function svgDonut(pct,color,W){
  const r=W/2-6,cx=W/2,cy=W/2;
  const circ=2*Math.PI*r;
  const dash=circ*pct/100;
  return`<svg width="${W}" height="${W}" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#e5e7eb" stroke-width="8"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="8"
      stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>
    <text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="700" fill="#111827">${pct}%</text>
  </svg>`;
}

// ===== COMPARATIVA SONDER vs RIVALES (barras divergentes) =====
let cmpSets=[1,2,3,4,5];  // filtro de set para la comparativa

function svgDivergent(rows,W){
  // rows: [{label, sonder, rival}] — escala POR FILA (cada metrica su proporcion)
  const rowH=54, padT=10, padB=10, H=padT+padB+rows.length*rowH;
  const mid=W/2, barMax=W/2-44;  // dejo margen para los numeros
  let s=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto">`;
  rows.forEach((r,i)=>{
    const y=padT+i*rowH;
    const rowMax=Math.max(r.sonder,r.rival,1);
    const wS=r.sonder/rowMax*barMax;
    const wR=r.rival/rowMax*barMax;
    const barY=y+22, barH=20, cy=barY+barH/2;
    // etiqueta centrada arriba
    s+=`<text x="${mid}" y="${y+14}" text-anchor="middle" font-size="11" font-weight="700" fill="#475569" letter-spacing="0.5">${r.label}</text>`;
    // barras
    s+=`<rect x="${mid-wS}" y="${barY}" width="${wS}" height="${barH}" fill="#1f2937" rx="2"/>`;
    s+=`<rect x="${mid}" y="${barY}" width="${wR}" height="${barH}" fill="#dc2626" rx="2"/>`;
    // valores al extremo de cada barra
    s+=`<text x="${mid-wS-6}" y="${cy+4}" text-anchor="end" font-size="14" font-weight="700" fill="#1f2937">${r.sonder}</text>`;
    s+=`<text x="${mid+wR+6}" y="${cy+4}" text-anchor="start" font-size="14" font-weight="700" fill="#dc2626">${r.rival}</text>`;
  });
  s+=`<line x1="${mid}" y1="0" x2="${mid}" y2="${H}" stroke="#cbd5e1" stroke-width="1.5"/>`;
  s+=`</svg>`;
  return s;
}

function buildComparativa(ps,FW){
  // Suma SONDER y rival de los partidos seleccionados.
  // Filtro de set: si hay datos por set los usamos; los totales 'riv' son por partido,
  // asi que el filtro de set aplica plenamente a SONDER (que tiene desglose) y,
  // cuando se filtran sets, el rival se prorratea proporcional a sets jugados.
  const allSets=cmpSets.length===5 || cmpSets.length===0;
  let sAces=0,sAtq=0,sAtqPts=0,sBl=0,sErrForz=0,sPts=0,sAe=0;
  let rAces=0,rAtq=0,rAtqPts=0,rBl=0,rErrForz=0,rPts=0,rAe=0;

  ps.forEach(p=>{
    const t=p.team;
    const sonderErr=(t.se||0)+(t.ae||0)+(t.re||0);
    if(allSets){
      sAces+=t.sp||0; sAtq+=t.at||0; sAtqPts+=t.ap||0; sBl+=t.bl||0; sErrForz+=sonderErr; sAe+=t.ae||0;
      rAces+=p.riv.aces; rAtq+=p.riv.at; rAtqPts+=p.riv.ap; rBl+=p.riv.bl; rPts+=p.riv.pts; rAe+=p.riv.ae||0;
    } else {
      const setsJug=p.sets.length;
      const setsSel=cmpSets.filter(n=>n<=setsJug).length;
      const f=setsJug>0? setsSel/setsJug : 1;
      sAces+=Math.round((t.sp||0)*f); sAtq+=Math.round((t.at||0)*f); sAtqPts+=Math.round((t.ap||0)*f);
      sBl+=Math.round((t.bl||0)*f); sErrForz+=Math.round(sonderErr*f); sAe+=Math.round((t.ae||0)*f);
      if(p.rivSets){
        cmpSets.forEach(n=>{const rs=p.rivSets[n]; if(rs){rAces+=rs.aces;rAtqPts+=rs.ap;rBl+=rs.bl;rAtq+=rs.at||0;rAe+=rs.ae||0;}});
      } else {
        rAces+=Math.round(p.riv.aces*f); rAtq+=Math.round(p.riv.at*f); rAtqPts+=Math.round(p.riv.ap*f);
        rBl+=Math.round(p.riv.bl*f); rAe+=Math.round((p.riv.ae||0)*f);
      }
    }
  });

  // Errores del rival = los que nos regalaron (= nuestros puntos por error rival).
  // No siempre lo tenemos directo; lo dejamos fuera si no hay dato fiable.
  // Total de puntos:
  if(allSets){
    sPts=ps.reduce((a,p)=>a+(p.team.pts||0),0);
  } else {
    sPts=sAtqPts+sBl+sAces; // aproximacion con lo prorrateado
    rPts=rAtqPts+rBl+rAces;
  }

  const rows=[
    {label:'ACES',     sonder:sAces,   rival:rAces},
    {label:'ATAQUES',  sonder:sAtq,    rival:rAtq},
    {label:'PTS ATAQUE',sonder:sAtqPts,rival:rAtqPts},
    {label:'ERRORES ATAQUE',sonder:sAe,rival:rAe},
    {label:'BLOQUEOS', sonder:sBl,     rival:rBl},
    {label:'PUNTOS TOT',sonder:sPts,   rival:rPts}
  ];
  const setChecks=[1,2,3,4,5].map(n=>`<label class="dd-chk"><input type="checkbox" ${cmpSets.includes(n)?'checked':''} onchange="cmpToggleSet(${n})"> Set ${n}</label>`).join('');
  const rivNames=[...new Set(ps.map(p=>p.rival))].join(', ');

  return `
  <div class="chart-card" style="margin-bottom:16px">
    <div class="chart-title">SONDER B vs Rivales — comparativa general</div>
    <div class="chart-subtitle" style="margin-bottom:6px">Suma de los partidos seleccionados arriba. <span style="color:#1e293b;font-weight:700">SONDER</span> vs <span style="color:#dc2626;font-weight:700">Rivales</span>. ${allSets?'Todos los sets.':'Sets '+cmpSets.join(',')+' (rival prorrateado).'}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">${setChecks}</div>
    ${svgDivergent(rows,FW)}
  </div>`;
}
function cmpToggleSet(n){const i=cmpSets.indexOf(n);if(i>=0)cmpSets.splice(i,1);else cmpSets.push(n);renderRotaciones();}

function renderGraficos(){
  if(sel.length===0){document.getElementById('tab-graficos').innerHTML='';return;}
  const jugs=getAgg(); // incluye liberos para recepcion
  const jugsNoLib=jugs.filter(j=>POS[j.k]!=='LIB');
  const FW=736; // ancho full para graficos grandes
  const ps=getPs();

  // 1. Puntos totales — horizontal, sin liberos, con % sobre el total del equipo
  const ptsD=jugsNoLib.filter(j=>j.pts>0).sort((a,b)=>b.pts-a.pts);
  const totPts=ptsD.reduce((a,j)=>a+j.pts,0)||1;
  ptsD.forEach(j=>j.pctEq=(j.pts/totPts*100).toFixed(1)+'%');
  const ptsH=ptsD.length*28+32;
  const ptsChart=svgBarH(ptsD,FW/2-8,ptsH,'#2563eb','pts','n','',null,'pctEq','');

  // 2. Eficacia ataque — barras horizontales con cantidad de ataques a la derecha
  const atqD=jugsNoLib.filter(j=>j.at>4&&j.af!=null).sort((a,b)=>b.af-a.af);
  const atqH=atqD.length*28+32;
  const atqChart=svgBarH(atqD,FW/2-8,atqH,'#16a34a','af','n','%',100,'at','atq');

  // 3. Recepción — INCLUYE LIBEROS, solo con más de 20 recepciones, total a la derecha
  const recD=jugs.filter(j=>j.rp!=null&&j.rt>20).sort((a,b)=>b.rp-a.rp);
  const recH=recD.length*28+32;
  const recChart=svgBarH(recD,FW/2-8,recH,'#0891b2','rp','n','%',100,'rt','rec');

  // 4. Bloqueos — horizontal, con % sobre el total de bloqueos del equipo
  const blD=jugsNoLib.filter(j=>j.bl>0).sort((a,b)=>b.bl-a.bl);
  const totBl=blD.reduce((a,j)=>a+j.bl,0)||1;
  blD.forEach(j=>j.pctEq=(j.bl/totBl*100).toFixed(1)+'%');
  const blH=blD.length*28+32;
  const blChart=svgBarH(blD,FW/2-8,blH,'#d97706','bl','n','',null,'pctEq','');

  // 5. Aces — horizontal
  const saqD=jugsNoLib.filter(j=>j.sp>0).sort((a,b)=>b.sp-a.sp);
  const saqH=saqD.length*28+32;
  const saqChart=svgBarH(saqD,FW/2-8,saqH,'#7c3aed','sp','n','',null);

  // 6. Evolucion puntos por jugador — grafico ancho y grande
  // Etiqueta corta que conserva A/B (CNSA A vs CNSA B, NN3 A) cuando lo tiene
  const shortLabel=p=>{const parts=p.rival.split(' ');return /^[A-Z]$/.test(parts[1]||'')?parts[0]+' '+parts[1]:parts[0];};
  const labels=ps.map(shortLabel);
  const topPlayers=['Pola','Reyes','Bertola J','Nicolosi','Burkett','Don'];
  // Paleta bien diferenciada (alto contraste entre vecinos)
  const evoColors=['#2563eb','#dc2626','#7c3aed','#ea580c','#15803d','#0d9488'];
  const evoSeries=topPlayers.map((k,i)=>({
    name:k,color:evoColors[i],
    data:ps.map(p=>{const j=p.equipo.find(x=>x.k===k);return j&&j.pts>0?j.pts:null;})
  })).filter(s=>s.data.some(v=>v!=null));
  const evoChart=svgLine(evoSeries,labels,FW,340);
  const evoLegend=evoSeries.map(s=>`<div class="evo-leg-item"><div class="evo-dot" style="background:${s.color}"></div>${s.name}</div>`).join('');

  // 6b. Evolucion ERRORES DE ATAQUE por jugador
  const errSeries=topPlayers.map((k,i)=>({
    name:k,color:evoColors[i],
    data:ps.map(p=>{const j=p.equipo.find(x=>x.k===k);return j&&j.at>0?(j.ae||0):null;})

function renderEquipo(){
  const ps=getPs();
  if(ps.length===0){document.getElementById('tab-equipo').innerHTML='';return;}
  const rows=ps.map(p=>{
    const isW=p.res==='W';
    return`<tr>
      <td>${p.fecha}</td>
      <td>${p.rival}</td>
      <td><span class="${isW?'ph':'pl'}" style="font-weight:600">${isW?'G':'P'} ${p.ss}-${p.sr}</span></td>
      <td><strong>${p.team.pts}</strong></td>
      <td>${fp(p.team.af)}</td>
      <td>${fp(p.team.rp)}</td>
      <td>${p.team.sp}</td>
      <td>${p.team.bl}</td>
      <td class="pl">${p.team.se}</td>
    </tr>`;
  }).join('');
  let trp=0,taf=0;ps.forEach(p=>{trp+=p.team.rp;taf+=p.team.af;});
  const avRp=Math.round(trp/ps.length),avAf=Math.round(taf/ps.length);

  // ---- Side-Out / Break Point ----
  // FUENTE CORRECTA: "Cada X recepciones, 1 punto" (soEach/bpEach) de la tabla DataVolley.
  // El numero grande "Puntos SO" en la tabla es el total de recepciones, NO los side-outs ganados.
  // Puntos SO reales = recepciones / soEach · SO% = 1/soEach
  let soPts=0,soTot=0,bpPts=0,bpTot=0;
  ps.forEach(p=>{
    soPts+=Math.round(p.team.rt/p.team.soEach);
    soTot+=p.team.rt;
    bpPts+=Math.round(p.team.st/p.team.bpEach);
    bpTot+=p.team.st;
  });
  const soPct=Math.round(soPts/soTot*100);
  const bpPct=Math.round(bpPts/bpTot*100);
  const soEach=(soTot/soPts).toFixed(2);
  const bpEach=(bpTot/bpPts).toFixed(2);

  const sobpRows=ps.map(p=>{
    const soP=Math.round(p.team.rt/p.team.soEach);
    const bpP=Math.round(p.team.st/p.team.bpEach);
    const so=Math.round(100/p.team.soEach);
    const bp=Math.round(100/p.team.bpEach);
    return`<tr>
      <td>${p.fecha}</td><td>${p.rival}</td>
      <td class="gr">${soP}</td>
      <td class="gr"><span class="${so>=55?'ph':so>=45?'pm':'pl'}">${so}%</span></td>
      <td class="gr">${p.team.soEach}</td>
      <td class="gs">${bpP}</td>
      <td class="gs"><span class="${bp>=30?'ph':bp>=25?'pm':'pl'}">${bp}%</span></td>
      <td class="gs">${p.team.bpEach}</td>
    </tr>`;
  }).join('');

  // Grafico evolutivo SO vs BP
  const sobpLabels=ps.map(p=>{const parts=p.rival.split(' ');return /^[A-Z]$/.test(parts[1]||'')?parts[0]+' '+parts[1]:parts[0];});
  const sobpSeries=[
    {name:'Side-Out (%)',color:'#0891b2',data:ps.map(p=>Math.round(100/p.team.soEach))},
    {name:'Break Point (%)',color:'#7c3aed',data:ps.map(p=>Math.round(100/p.team.bpEach))}
  ];
  const sobpChart=svgLine(sobpSeries,sobpLabels,736,220);
  const sobpLegend=sobpSeries.map(s=>`<div class="evo-leg-item"><div class="evo-dot" style="background:${s.color}"></div>${s.name}</div>`).join('');

  document.getElementById('tab-equipo').innerHTML=`
    <p class="st">Resultados</p>
    <div class="table-wrap"><table>
      <thead><tr>
        <th style="text-align:left">Fecha</th>
        <th style="text-align:left">Rival</th>
        <th style="text-align:left">Res.</th>
        <th>Pts</th>
        <th class="ga">Ef. Atq</th>
        <th class="gr">Rec+</th>
        <th class="gs">Aces</th>
        <th class="gb">Bloq</th>
        <th>Err Saq</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>

    <p class="st">Promedios</p>
    <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center;margin-bottom:28px">
      <div style="text-align:center">${svgDonut(avAf,'#2563eb',90)}<div style="font-size:11px;font-weight:600;color:#374151;margin-top:4px">Ef. Ataque</div></div>
      <div style="text-align:center">${svgDonut(avRp,'#0891b2',90)}<div style="font-size:11px;font-weight:600;color:#374151;margin-top:4px">Recepción+</div></div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div><span class="kpi-label">Aces totales</span><br><span style="font-size:22px;font-weight:700">${ps.reduce((a,p)=>a+p.team.sp,0)}</span></div>
        <div><span class="kpi-label">Bloqueos totales</span><br><span style="font-size:22px;font-weight:700">${ps.reduce((a,p)=>a+p.team.bl,0)}</span></div>
        <div><span class="kpi-label">Victorias / Partidos</span><br><span style="font-size:22px;font-weight:700">${ps.filter(p=>p.res==='W').length}<span style="font-size:14px;color:var(--muted)"> / ${ps.length}</span></span></div>
      </div>
    </div>

    <p class="st">Side-Out & Break Point</p>
    <p class="leg" style="margin-top:-8px;margin-bottom:16px">
      <strong>Side-Out (SO):</strong> punto ganado cuando el equipo recibe. Mide qué tan bien se resuelve la fase de recepción-ataque. &nbsp;·&nbsp;
      <strong>Break Point (BP):</strong> punto ganado cuando el equipo saca (le rompe el saque al rival). Es la métrica que decide los partidos parejos. &nbsp;·&nbsp;
      <strong>Cada X:</strong> cuántas recepciones/saques necesita el equipo para conseguir 1 punto (más bajo = mejor).
    </p>
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px">
      <div class="kpi-card" style="flex:1;min-width:200px">
        <div class="kpi-label" style="color:var(--c2)">Side-Out global</div>
        <div class="kpi-value${soPct>=55?' good':soPct>=45?' mid':' bad'}">${soPct}%</div>
        <div class="kpi-sub">${soPts} puntos en ${soTot} recepciones · 1 punto cada ${soEach} recepciones</div>
      </div>
      <div class="kpi-card" style="flex:1;min-width:200px">
        <div class="kpi-label" style="color:var(--c3)">Break Point global</div>
        <div class="kpi-value${bpPct>=30?' good':bpPct>=25?' mid':' bad'}">${bpPct}%</div>
        <div class="kpi-sub">${bpPts} break points en ${bpTot} saques · 1 BP cada ${bpEach} saques</div>
      </div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th style="text-align:left">Fecha</th><th style="text-align:left">Rival</th>
        <th class="gr">Pts SO</th><th class="gr">SO %</th><th class="gr">Cada N° rec.</th>
        <th class="gs">Pts BP</th><th class="gs">BP %</th><th class="gs">Cada N° saq.</th>
      </tr></thead>
      <tbody>${sobpRows}</tbody>
    </table></div>
    <p class="leg" style="margin-bottom:18px">SO%: <span class="ph">≥55%</span> · <span class="pm">≥45%</span> · <span class="pl">&lt;45%</span> &nbsp;|&nbsp; BP%: <span class="ph">≥30%</span> · <span class="pm">≥25%</span> · <span class="pl">&lt;30%</span></p>

    <div class="chart-card" style="margin-bottom:16px">
      <div class="chart-title">Evolución Side-Out vs Break Point por partido (%)</div>
      <div class="chart-subtitle" style="margin-bottom:14px">El SO suele estar por encima del BP (es más fácil ganar recibiendo que rompiendo el saque). Cuando ambas líneas caen juntas, el equipo pierde.</div>
      <div style="overflow-x:auto">${sobpChart}</div>
      <div class="evo-legend">${sobpLegend}</div>
    </div>`;
}

function renderRotaciones(){
  const ps=getPs();
  if(ps.length===0){document.getElementById('tab-rotaciones').innerHTML='';return;}
  // Agregado ponderado por intentos (tot)
  function agg(key){
    let sEf=0,sTot=0,rEf=0,rTot=0;
    ps.forEach(p=>{
      const r=p.team.rot[key+'S'], rr=p.team.rot[key+'R'];
      sEf+=r.ef*r.tot; sTot+=r.tot;
      rEf+=rr.ef*rr.tot; rTot+=rr.tot;
    });
    return {s:{ef:sTot?Math.round(sEf/sTot):0,tot:sTot}, r:{ef:rTot?Math.round(rEf/rTot):0,tot:rTot}};
  }
  const pos=agg('pos'), neg=agg('neg'), con=agg('con');

  // ---- Rendimiento por rotacion (Dif en puntos por ZONA DEL ARMADOR) ----
  // lrot indexado por zona del armador: lrot[0]=armador Z1, lrot[1]=armador Z2, ... lrot[5]=armador Z6.
  const lrotSum=[0,0,0,0,0,0];
  ps.forEach(p=>{p.team.lrot.forEach((v,i)=>lrotSum[i]+=v);});
  const maxAbs=Math.max(...lrotSum.map(v=>Math.abs(v)),1);

  function difColor(v){
    if(v>0)return '#16a34a';
    if(v<0)return '#dc2626';
    return '#9ca3af';
  }
  function difBg(v){
    const a=Math.min(Math.abs(v)/maxAbs,1)*0.75+0.15;
    if(v>0)return `rgba(22,163,74,${a})`;
    if(v<0)return `rgba(220,38,38,${a})`;
    return 'rgba(156,163,175,0.2)';
  }

  // Cancha en miniatura. Red arriba. Fila delantera 4-3-2, trasera 5-6-1.
  // Resaltamos la zona donde está EL ARMADOR en esa rotación.
  const zonePos={4:[0,0],3:[1,0],2:[2,0],5:[0,1],6:[1,1],1:[2,1]};
  function miniCourt(setterZone,dif){
    const cw=132,chh=100,pad=4;
    const cellW=(cw-pad*2)/3, cellH=(chh-pad*2)/2;
    let svg=`<svg width="${cw}" height="${chh}" xmlns="http://www.w3.org/2000/svg" style="border-radius:2px">`;
    svg+=`<rect x="0" y="0" width="${cw}" height="${chh}" fill="#fff" stroke="#9ca3af" stroke-width="1.5" rx="2"/>`;
    // red negra gruesa arriba
    svg+=`<line x1="0" y1="${pad}" x2="${cw}" y2="${pad}" stroke="#1f2937" stroke-width="3"/>`;
    [4,3,2,5,6,1].forEach(z=>{
      const [c,r]=zonePos[z];
      const x=pad+c*cellW, y=pad+r*cellH;
      const isSetter=(z===setterZone);
      svg+=`<rect x="${x}" y="${y}" width="${cellW-1}" height="${cellH-1}" fill="${isSetter?difBg(dif):'#ffffff'}" stroke="${isSetter?difColor(dif):'#9ca3af'}" stroke-width="${isSetter?'1.5':'0.6'}" stroke-dasharray="${isSetter?'':'3 2'}"/>`;
      svg+=`<text x="${x+cellW/2}" y="${y+cellH/2-2}" text-anchor="middle" font-size="9" fill="${isSetter?'#374151':'#cbd5e1'}" font-weight="${isSetter?'700':'400'}">Z${z}</text>`;
      if(isSetter){
        svg+=`<text x="${x+cellW/2}" y="${y+cellH/2+12}" text-anchor="middle" font-size="11" fill="${difColor(dif)}" font-weight="700">${dif>0?'+':''}${dif}</text>`;
      }
    });
    svg+=`</svg>`;
    return svg;
  }

  // Grid de las 6 zonas del armador
  function rotCard(sz){
    const dif=lrotSum[sz-1];
    const fase = sz===1 ? 'Saque (BP)' : 'Recep./juego';
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:5px">
      <div style="font-size:11px;font-weight:600;color:var(--muted)">Armador en Z${sz}</div>
      ${miniCourt(sz,dif)}
      <div style="font-size:13px;font-weight:700;color:${difColor(dif)}">${dif>0?'+':''}${dif}</div>
      <div style="font-size:9px;color:var(--muted2)">${fase}</div>
    </div>`;
  }
  const rotCardsZag=[1,5,6].map(rotCard).join('');
  const rotCardsDel=[4,3,2].map(rotCard).join('');

  // Barra horizontal resumen
  function rotBar(sz,dif){
    const w=Math.abs(dif)/maxAbs*100;
    const isPos=dif>=0;
    return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="width:90px;font-size:11px;color:#374151;font-weight:500;text-align:right">Armador en Z${sz}</div>
      <div style="flex:1;display:flex;align-items:center;position:relative;height:18px">
        <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:#cbd5e1"></div>
        <div style="position:absolute;left:50%;${isPos?'':'transform:translateX(-100%);'}width:${w/2}%;height:14px;background:${difColor(dif)};opacity:0.85;border-radius:3px"></div>
      </div>
      <div style="width:36px;font-size:11px;font-weight:700;color:${difColor(dif)}">${dif>0?'+':''}${dif}</div>
    </div>`;
  }
  const rotBars=[1,2,3,4,5,6].map(rn=>rotBar(rn,lrotSum[rn-1])).join('');
  const totalDif=lrotSum.reduce((a,b)=>a+b,0);
  const worstRot=lrotSum.indexOf(Math.min(...lrotSum))+1;
  const bestRot=lrotSum.indexOf(Math.max(...lrotSum))+1;

  // Barra comparativa Sonder vs Rival
  function compBar(titulo,desc,d,color){
    const max=Math.max(d.s.ef,d.r.ef,1);
    const win=d.s.ef>=d.r.ef;
    return`
    <div class="chart-card" style="margin-bottom:14px">
      <div class="chart-title">${titulo}</div>
      <div class="chart-subtitle" style="margin-bottom:16px">${desc}</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div>
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
            <span style="font-weight:600;color:${color}">SONDER B</span>
            <span style="color:var(--muted)">${d.s.ef}% · ${d.s.tot} intentos</span>
          </div>
          <div style="background:var(--border);border-radius:4px;height:22px;overflow:hidden">
            <div style="width:${d.s.ef/max*100}%;height:100%;background:${color};border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700">${d.s.ef}%</div>
          </div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
            <span style="font-weight:600;color:var(--muted)">RIVAL</span>
            <span style="color:var(--muted)">${d.r.ef}% · ${d.r.tot} intentos</span>
          </div>
          <div style="background:var(--border);border-radius:4px;height:22px;overflow:hidden">
            <div style="width:${d.r.ef/max*100}%;height:100%;background:#9ca3af;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700">${d.r.ef}%</div>
          </div>
        </div>
      </div>
      <div style="margin-top:12px;font-size:11px;font-weight:600;color:${win?'var(--win)':'var(--loss)'}">
        ${win?'✓ Ventaja SONDER':'✗ Ventaja rival'} (${win?'+':''}${d.s.ef-d.r.ef} pts)
      </div>
    </div>`;
  }

  document.getElementById('tab-rotaciones').innerHTML=`
    ${buildComparativa(ps,736)}
    <p class="st">Rendimiento por zona del armador</p>
    <p class="leg" style="margin-top:-8px;margin-bottom:18px">
      Diferencial de puntos del equipo según la zona en la que está el armador en cada rotación, sumando los partidos seleccionados. <strong>Armador en Z1 = el equipo está al saque</strong> (fase de break point); en el resto de las zonas el equipo viene de recibir o está en juego. <span class="ph">Verde</span> = el equipo gana puntos con el armador en esa zona · <span class="pl">rojo</span> = los pierde. Sirve para detectar en qué momento del giro el equipo sufre.
    </p>
    <div class="chart-card" style="margin-bottom:14px">
      <div class="chart-title">Cancha por zona del armador — diferencial acumulado</div>
      <div class="chart-subtitle" style="margin-bottom:16px">La red está arriba. La zona resaltada es dónde está parado el armador en esa rotación.</div>
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Armador zaguero (saque y fondo)</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:20px">${rotCardsZag}</div>
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;padding-top:14px;border-top:1px solid var(--border)">Armador delantero (en red)</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding-bottom:8px">${rotCardsDel}</div>
    </div>
    <div class="chart-card" style="margin-bottom:14px">
      <div class="chart-title">Resumen — diferencial por zona del armador</div>
      <div class="chart-subtitle" style="margin-bottom:16px">Barras a la derecha (verde) = zonas positivas · a la izquierda (rojo) = negativas.</div>
      ${rotBars}
      <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
        <div><span class="kpi-label">Total</span><br><span style="font-size:18px;font-weight:700;color:${difColor(totalDif)}">${totalDif>0?'+':''}${totalDif}</span></div>
        <div><span class="kpi-label">Mejor zona</span><br><span style="font-size:18px;font-weight:700;color:var(--win)">Z${bestRot} (${lrotSum[bestRot-1]>0?'+':''}${lrotSum[bestRot-1]})</span></div>
        <div><span class="kpi-label">Zona a mejorar</span><br><span style="font-size:18px;font-weight:700;color:var(--loss)">Z${worstRot} (${lrotSum[worstRot-1]})</span></div>
      </div>
    </div>

    <p class="st" style="margin-top:24px">Análisis de rotación — SONDER vs Rival</p>
    <p class="leg" style="margin-top:-8px;margin-bottom:18px">
      Cada pelota cae en una de tres situaciones. Acá se compara la <strong>eficacia de ataque de SONDER contra la del rival</strong> en cada una, ponderada por la cantidad de intentos. Donde SONDER supera al rival, ahí está la ventaja del equipo.
    </p>
    ${compBar('1° Ataque tras recepción POSITIVA (+#)','Recibiste bien, el armador distribuye cómodo y atacás en buenas condiciones. Es la situación más favorable: acá deberías dominar.',pos,'#16a34a')}
    ${compBar('1° Ataque tras recepción NEGATIVA (-!)','Recibiste mal, el ataque sale de emergencia o forzado. Suele ser pocas pelotas pero muestra capacidad de resolver en incomodidad.',neg,'#d97706')}
    ${compBar('Contraataque','Ya estás en rally: defendiste una pelota del rival y contraatacás. Mide la solidez en defensa-transición, clave en los puntos largos.',con,'#2563eb')}
  `;
}

// Estado de filtros del armador
let armState={equipo:'SONDER',setters:['Verasio'],sets:[1,2,3,4,5],recs:['#','+','!','-','/','=']};
const REC_NAMES={'#':'# Perfecta','+':'+ Positiva','!':'! Admiración','-':'- Negativa','/':'/ Vendida','=':'= Error'};

function renderArmador(){
  const el=document.getElementById('tab-armador');
  const selNames=sel.map(i=>partidos[i]&&('vs '+partidos[i].rival));
  const recs=DVW.flatMap(p=>p.records.map(r=>({...r,partido:p.partido})))
    .filter(r=>selNames.includes(r.partido));
  // armadores disponibles segun el equipo elegido (nuestros o rivales)
  const setters=[...new Set(recs.filter(r=>r.team===armState.equipo).map(r=>r.setter))].sort();
  // si los setters seleccionados no pertenecen al equipo actual, resetear al primero
  if(!armState.setters.some(s=>setters.includes(s))) armState.setters=setters.length?[setters[0]]:[];
  // para rivales no hay filtro de recepcion (no rastreamos su recepcion), se ignora ese filtro
  const esRival=armState.equipo==='RIVAL';
  const f=recs.filter(r=>
    r.team===armState.equipo &&
    armState.setters.includes(r.setter) &&
    armState.sets.includes(r.set) &&
    (esRival || armState.recs.includes(r.rec))
  );

  // Agrupar por zona del armador (sz) -> zona origen (oz)
  const byZone={};
  [1,2,3,4,5,6].forEach(z=>byZone[z]={});
  f.forEach(r=>{
    if(!byZone[r.sz][r.oz]) byZone[r.sz][r.oz]={tot:0,pt:0,er:0,bl:0};
    const c=byZone[r.sz][r.oz];
    c.tot++;
    if(r.ev==='#')c.pt++; else if(r.ev==='=')c.er++; else if(r.ev==='/')c.bl++;
  });

  // Colores de eficacia
  function efColor(ef){if(ef>=50)return '#16a34a';if(ef>=33)return '#d97706';return '#dc2626';}

  // Mini-cancha de distribucion: muestra flechas/valores hacia cada zona de origen
  // Disposicion: 4-3-2 adelante (red arriba), 5-6-1 atras
  const zonePos={4:[0,0],3:[1,0],2:[2,0],5:[0,1],6:[1,1],1:[2,1]};
  // origen de ataque -> a que celda fisica corresponde (9=zaguero z1, 8=pipe z6)
  const ozCell={'4':4,'3':3,'2':2,'9':1,'8':6,'1':1,'6':6,'5':5,'7':5};

  function court(sz){
    const zonas=byZone[sz];
    const total=Object.values(zonas).reduce((a,c)=>a+c.tot,0);
    // proporción coherente con el resto (vertical angosta): solo se usa la mitad de ataque (3 filas de zonas: red/3m/fondo no aplica acá; mostramos las 6 zonas)
    const cw=180, pad=8;
    const cellW=(cw-pad*2)/3, cellH=cellW*1.12;
    const chh=cellH*2+pad*2;
    let svg=`<svg width="${cw}" height="${chh}" xmlns="http://www.w3.org/2000/svg">`;
    svg+=`<rect x="0" y="0" width="${cw}" height="${chh}" fill="#fff" stroke="#9ca3af" stroke-width="1.5" rx="2"/>`;
    // red negra gruesa arriba (la zona delantera está pegada a la red)
    svg+=`<line x1="0" y1="${pad}" x2="${cw}" y2="${pad}" stroke="#1f2937" stroke-width="3"/>`;
    [4,3,2,5,6,1].forEach(z=>{
      const [c,r]=zonePos[z];
      const x=pad+c*cellW, y=pad+r*cellH;
      const isSetter=(z===sz);
      let cellAtk=0,cellPt=0;
      Object.entries(zonas).forEach(([oz,d])=>{ if(ozCell[oz]===z){cellAtk+=d.tot;cellPt+=d.pt;} });
      const pct=total?Math.round(cellAtk/total*100):0;
      const ef=cellAtk?Math.round(cellPt/cellAtk*100):0;
      let bg='#ffffff';
      if(cellAtk>0){const a=Math.min(cellAtk/Math.max(total,1),1)*0.55+0.12; bg=`rgba(37,99,235,${a})`;}
      svg+=`<rect x="${x}" y="${y}" width="${cellW-1}" height="${cellH-1}" fill="${bg}" stroke="${isSetter?'#7c3aed':'#e5e7eb'}" stroke-width="${isSetter?'2.5':'0.5'}" stroke-dasharray="${isSetter?'':'3 2'}"/>`;
      svg+=`<text x="${x+5}" y="${y+13}" font-size="10" fill="#9ca3af" font-weight="500">Z${z}${isSetter?' ★':''}</text>`;
      if(cellAtk>0){
        const mx=x+cellW/2;
        const tTop=y+18;
        svg+=`<text x="${mx}" y="${tTop+14}" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">${cellAtk}</text>`;
        svg+=`<text x="${mx}" y="${tTop+27}" text-anchor="middle" font-size="9" fill="#6b7280" font-weight="600">${pct}% dist</text>`;
        svg+=`<text x="${mx}" y="${tTop+38}" text-anchor="middle" font-size="9" fill="${efColor(ef)}" font-weight="700">ef ${ef}%</text>`;
      }
    });
    svg+=`</svg>`;
    return svg;
  }

  const filaName={1:'Z1 · zaguero (saque)',2:'Z2 · delantero der',3:'Z3 · delantero centro',4:'Z4 · delantero izq',5:'Z5 · zaguero izq',6:'Z6 · zaguero centro'};
  const courts=[1,5,6,4,3,2].map(sz=>{
    const total=Object.values(byZone[sz]).reduce((a,c)=>a+c.tot,0);
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="font-size:11px;font-weight:600;color:var(--text)">${filaName[sz]}</div>
      ${court(sz)}
      <div style="font-size:11px;color:var(--muted)">${total} ataque${total!==1?'s':''} de side-out</div>
    </div>`;
  }).join('');

  // Desplegables
  const setterChecks=setters.map(s=>`<label class="dd-chk"><input type="checkbox" value="${s}" ${armState.setters.includes(s)?'checked':''} onchange="armToggleSetter('${s}')"> ${s}</label>`).join('');
  const setChecks=[1,2,3,4,5].map(n=>`<label class="dd-chk"><input type="checkbox" value="${n}" ${armState.sets.includes(n)?'checked':''} onchange="armToggleSet(${n})"> Set ${n}</label>`).join('');
  const recChecks=['#','+','!','-','/','='].map(r=>`<label class="dd-chk"><input type="checkbox" value="${r}" ${armState.recs.includes(r)?'checked':''} onchange="armToggleRec('${r}')"> ${REC_NAMES[r]}</label>`).join('');

  const setterLabel=armState.setters.length?armState.setters.join(' + '):'ninguno';
  const esRivalView=armState.equipo==='RIVAL';
  el.innerHTML=`
    <p class="st">Distribución del armador por rotación</p>
    <p class="leg" style="margin-top:-8px;margin-bottom:16px">
      A qué zona arma el armador en cada una de sus 6 rotaciones, sobre el <strong>primer ataque tras recepción (side-out)</strong>${esRivalView?' — para los rivales se muestran todos los ataques (no rastreamos su recepción)':''}. Dato extraído del scout .dvw. El número grande de cada celda es la cantidad de ataques; debajo, el % de distribución y la eficacia. La celda con ★ es donde está parado el armador. <strong>Fuente: solo partidos con .dvw (Náutico, CITTA, NCSA B, Cevils, Sonder A).</strong>
    </p>
    <div class="arm-filters">
      <div class="arm-filter-group">
        <label class="arm-label">Equipo</label>
        <select onchange="armSetEquipo(this.value)" class="arm-select">
          <option value="SONDER" ${armState.equipo==='SONDER'?'selected':''}>Nuestros armadores</option>
          <option value="RIVAL" ${armState.equipo==='RIVAL'?'selected':''}>Armadores rivales</option>
        </select>
      </div>
      <div class="arm-filter-group">
        <label class="arm-label">Armador</label>
        <div class="dd-checks">${setterChecks}</div>
      </div>
      <div class="arm-filter-group">
        <label class="arm-label">Sets</label>
        <div class="dd-checks">${setChecks}</div>
      </div>
      ${esRivalView?'':`<div class="arm-filter-group">
        <label class="arm-label">Tipo de recepción</label>
        <div class="dd-checks">${recChecks}</div>
      </div>`}
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:16px">
      Mostrando <strong>${f.length}</strong> ataques de <strong>${setterLabel}</strong>
    </div>
    <div class="chart-card">
      <div class="chart-title">Cancha por rotación del armador</div>
      <div class="chart-subtitle" style="margin-bottom:18px">Red arriba. Cada celda muestra cuántos ataques salieron de esa zona, el % de distribución y la eficacia, según dónde está parado el armador.</div>
      <div style="display:grid;grid-template-columns:repeat(3,minmax(280px,1fr));gap:24px;justify-items:center;overflow-x:auto">${courts}</div>
    </div>
  `;
}

function armSetEquipo(eq){
  armState.equipo=eq;
  // resetear seleccion de armadores al primero del nuevo equipo
  const recs=DVW.flatMap(p=>p.records);
  const setters=[...new Set(recs.filter(r=>r.team===eq).map(r=>r.setter))].sort();
  armState.setters=setters.length?[setters[0]]:[];
  renderArmador();
}
function armToggleSetter(s){const i=armState.setters.indexOf(s);if(i>=0)armState.setters.splice(i,1);else armState.setters.push(s);renderArmador();}
function armToggleSet(n){const i=armState.sets.indexOf(n);if(i>=0)armState.sets.splice(i,1);else armState.sets.push(n);renderArmador();}
function armToggleRec(r){const i=armState.recs.indexOf(r);if(i>=0)armState.recs.splice(i,1);else armState.recs.push(r);renderArmador();}

// ===== ATACANTES =====
let atkState={jugador:'Todos',vista:'flechas',sets:[1,2,3,4,5],fase:'todos'};

function renderAtacantes(){
  const el=document.getElementById('tab-atacantes');
  // partidos seleccionados arriba (sel) -> nombres
  const selNames=sel.map(i=>partidos[i]&&('vs '+partidos[i].rival));
  // cada record con su partido; filtrar por los partidos seleccionados arriba
  const recs=ATK.flatMap(p=>p.records.map(r=>({...r,partido:p.partido})))
    .filter(r=>selNames.includes(r.partido));
  const jugadores=['Todos',...[...new Set(recs.map(r=>r.j))].sort()];

  // Filtro base (sin zona — la zona define cada cancha)
  let base=recs.filter(r=>r.oz&&r.dz);
  if(atkState.jugador!=='Todos') base=base.filter(r=>r.j===atkState.jugador);
  if(atkState.fase==='sideout') base=base.filter(r=>r.so);
  base=base.filter(r=>atkState.sets.includes(r.set));

  // Agrupamiento: SIEMPRE por SALIDA (combo) ordenado por volumen,
  // tanto con un jugador elegido como con "Todos".
  const porSalida = true;
  let courts;
  if(porSalida){
    // contar por combo, ordenar por volumen desc
    const byCombo={};
    base.forEach(r=>{const c=r.combo||'?';(byCombo[c]=byCombo[c]||[]).push(r);});
    const combosOrden=Object.keys(byCombo).sort((a,b)=>byCombo[b].length-byCombo[a].length);
    courts = combosOrden.length
      ? combosOrden.map(combo=>attackCourt(combo, byCombo[combo], comboLabel(combo))).join('')
      : '<div style="color:var(--muted);font-size:12px;padding:20px">Sin ataques con destino para este filtro.</div>';
  } else {
    const zonasOrigen=[...new Set(base.map(r=>r.oz))].sort();
    const zoneLabel={'1':'Z1 · zaguero der','2':'Z2 · punta der (opuesto)','3':'Z3 · central','4':'Z4 · punta izq','5':'Z5 · zaguero izq','6':'Z6 · zaguero centro','7':'Z7 · zaguero izq','8':'Z8 · pipe','9':'Z9 · zaguero der'};
    courts = zonasOrigen.length
      ? zonasOrigen.map(oz=>attackCourt(oz, base.filter(r=>r.oz===oz), zoneLabel[oz]||('Z'+oz))).join('')
      : '<div style="color:var(--muted);font-size:12px;padding:20px">Sin ataques con destino para este filtro.</div>';
  }

  // Controles
  const jugOpts=jugadores.map(j=>`<option value="${j}" ${j===atkState.jugador?'selected':''}>${j}</option>`).join('');
  const setChecks=[1,2,3,4,5].map(n=>`<label class="dd-chk"><input type="checkbox" ${atkState.sets.includes(n)?'checked':''} onchange="atkToggleSet(${n})"> Set ${n}</label>`).join('');

  el.innerHTML=`
    <p class="st">Mapa de ataque por salida (tipo de pelota armada)</p>
    <p class="leg" style="margin-top:-8px;margin-bottom:16px">
      Una cancha por cada <strong>salida</strong> (ordenadas por volumen), para ver la tendencia de ataque según la pelota que armó el armador. ${atkState.jugador==='Todos'?'Con "Todos" suma a todo el equipo; elegí un jugador para ver solo el suyo.':''} Se muestra el código de salida tal cual el scout (ej. W4, J1, G2).
      Tu campo abajo, rival arriba, red en el medio. ${atkState.vista==='flechas'?'Cada flecha es un ataque, de dónde sale a dónde cae. <span style="color:#16a34a;font-weight:700">Verde ▲ = punto</span> · <span style="color:#dc2626;font-weight:700">Rojo ✕ = error</span> · <span style="color:#1f2937;font-weight:700">Negro ● = sigue en juego</span>. <strong>Línea llena = ataque potente (hard)</strong> · <strong>línea punteada = suave o finta (soft/tip)</strong> — dato del scout.':'Mapa de calor = zonas del rival más atacadas.'} <strong>Solo ataques con destino registrado.</strong> Fuente: .dvw (Náutico, CITTA, NCSA B, Cevils, Sonder A).
    </p>
    <div class="arm-filters">
      <div class="arm-filter-group">
        <label class="arm-label">Jugador</label>
        <select onchange="atkSet('jugador',this.value)" class="arm-select">${jugOpts}</select>
      </div>
      <div class="arm-filter-group">
        <label class="arm-label">Vista</label>
        <select onchange="atkSet('vista',this.value)" class="arm-select">
          <option value="flechas" ${atkState.vista==='flechas'?'selected':''}>Flechas (zona a zona)</option>
          <option value="heatmap" ${atkState.vista==='heatmap'?'selected':''}>Mapa de calor</option>
        </select>
      </div>
      <div class="arm-filter-group">
        <label class="arm-label">Fase</label>
        <select onchange="atkSet('fase',this.value)" class="arm-select">
          <option value="todos" ${atkState.fase==='todos'?'selected':''}>Todos los ataques</option>
          <option value="sideout" ${atkState.fase==='sideout'?'selected':''}>Solo side-out</option>
        </select>
      </div>
      <div class="arm-filter-group">
        <label class="arm-label">Sets</label>
        <div class="dd-checks">${setChecks}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px">${courts}</div>
  `;
}

// Etiqueta de la salida (combo). Por ahora solo el codigo crudo;
