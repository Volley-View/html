// ===== CANCHA BASE REUTILIZABLE (misma estética en todo el dashboard) =====
// Devuelve la geometría y el SVG de la cancha vacía, idéntica a la de Atacantes.
// headerLines: array de {l1,v1,l2,v2} para los datos de arriba (opcional). label: texto grande.
function courtBase(opts){
  opts=opts||{};
  const W=170, padX=14, padTop=opts.padTop!=null?opts.padTop:58, courtW=W-padX*2;
  const courtH=courtW*1.9, halfH=courtH/2;
  const cx0=padX, cy0=padTop, netY=cy0+halfH;
  const myTop=netY, myBot=cy0+courtH, H=padTop+courtH+10, colW=courtW/3;
  const third=halfH/3, riv3m=netY-third, my3m=netY+third;
  const NET='#1f2937', LINE='#9ca3af', SUB='#9ca3af';

  // posiciones de zona (mismas que attackCourt)
  const myZone={4:[0,0],3:[1,0],2:[2,0],7:[0,1],8:[1,1],9:[2,1],5:[0,2],6:[1,2],1:[2,2]};
  const rivZone={2:[0,1],3:[1,1],4:[2,1],1:[0,0],6:[1,0],5:[2,0],7:[0,0],8:[1,0],9:[2,0]};
  const myXY=z=>{const [c,r]=myZone[z]||[1,0];return [cx0+c*colW+colW/2, myTop+r*(halfH/3)+(halfH/3)/2];};
  const rivXY=z=>{const [c,r]=rivZone[z]||[1,1];return [cx0+c*colW+colW/2, cy0+r*(halfH/2)+(halfH/2)/2];};
  // mapear coordenada x,y (0-100, sistema del .dvw) al lienzo de esta cancha
  // col 0=izq..100=der ; row 0=fondo mio (abajo) .. 100=fondo rival (arriba)
  const xyToCanvas=(col,row,invert)=>{
    const cc = invert ? (100-col) : col;
    const x = cx0 + (cc/100)*courtW;
    const y = invert ? (cy0 + (row/100)*courtH) : (cy0+courtH - (row/100)*courtH);
    return [x,y];
  };

  function bg(){
    let s='';
    // header opcional (datos arriba, mismo formato que Atacantes)
    if(opts.header){
      const lblX=cx0, val1X=cx0+78, lbl2X=cx0+88, val2X=cx0+courtW, dCol='#7c9cb5';
      const h=opts.header;
      if(h.l1!=null) s+=`<text x="${lblX}" y="16" font-size="10" fill="${dCol}">${h.l1}</text><text x="${val1X}" y="16" font-size="10" font-weight="700" fill="#374151" text-anchor="end">${h.v1||''}</text>`;
      if(h.l2!=null) s+=`<text x="${lblX}" y="28" font-size="10" fill="${dCol}">${h.l2}</text><text x="${val1X}" y="28" font-size="10" font-weight="700" fill="#374151" text-anchor="end">${h.v2||''}</text>`;
      if(h.r1!=null) s+=`<text x="${lbl2X}" y="16" font-size="10" fill="${dCol}">${h.r1}</text><text x="${val2X}" y="16" font-size="10" font-weight="700" fill="#374151" text-anchor="end">${h.rv1||''}</text>`;
      if(h.r2!=null) s+=`<text x="${lbl2X}" y="28" font-size="10" fill="${dCol}">${h.r2}</text><text x="${val2X}" y="28" font-size="10" font-weight="700" fill="#374151" text-anchor="end">${h.rv2||''}</text>`;
      if(h.r3!=null) s+=`<text x="${lbl2X}" y="40" font-size="10" fill="${dCol}">${h.r3}</text><text x="${val2X}" y="40" font-size="10" font-weight="700" fill="#374151" text-anchor="end">${h.rv3||''}</text>`;
    }
    if(opts.label) s+=`<text x="${cx0}" y="44" font-size="13" font-weight="800" fill="#111">${opts.label}</text>`;
    // cancha
    s+=`<rect x="${cx0}" y="${cy0}" width="${courtW}" height="${courtH}" fill="#fff" stroke="${LINE}" stroke-width="1.5"/>`;
    s+=`<line x1="${cx0}" y1="${netY}" x2="${cx0+courtW}" y2="${netY}" stroke="${NET}" stroke-width="3"/>`;
    s+=`<line x1="${cx0}" y1="${riv3m}" x2="${cx0+courtW}" y2="${riv3m}" stroke="${LINE}" stroke-width="1"/>`;
    s+=`<line x1="${cx0}" y1="${my3m}" x2="${cx0+courtW}" y2="${my3m}" stroke="${LINE}" stroke-width="1"/>`;
    [cx0+colW, cx0+colW*2].forEach(x=>{
      s+=`<line x1="${x}" y1="${my3m}" x2="${x}" y2="${myBot}" stroke="${SUB}" stroke-width="0.6" stroke-dasharray="3 2"/>`;
      s+=`<line x1="${x}" y1="${cy0}" x2="${x}" y2="${riv3m}" stroke="${SUB}" stroke-width="0.6" stroke-dasharray="3 2"/>`;
    });
    s+=`<line x1="${cx0}" y1="${(my3m+myBot)/2}" x2="${cx0+courtW}" y2="${(my3m+myBot)/2}" stroke="${SUB}" stroke-width="0.6" stroke-dasharray="3 2"/>`;
    s+=`<line x1="${cx0}" y1="${(cy0+riv3m)/2}" x2="${cx0+courtW}" y2="${(cy0+riv3m)/2}" stroke="${SUB}" stroke-width="0.6" stroke-dasharray="3 2"/>`;
    return s;
  }
  return {W,H,courtW,courtH,halfH,cx0,cy0,netY,myTop,myBot,colW,riv3m,my3m,myXY,rivXY,xyToCanvas,bg};
}

// Dibuja una cancha por salida — estética estilo Data Volley (cancha vertical, datos arriba, subzonas)
function attackCourt(oz, atks, label){
  // === Geometría: cancha vertical angosta (ratio ~1:1.9) ===
  // Mi campo = mitad inferior (de donde ataco). Rival = mitad superior.
  const W=170, padX=14, padTop=74, courtW=W-padX*2;
  const courtH=courtW*1.9;          // cancha alta y angosta
  const halfH=courtH/2;
  const cx0=padX, cy0=padTop;        // esquina sup-izq de la cancha
  const netY=cy0+halfH;              // red al medio
  const myTop=netY, myBot=cy0+courtH;// mi mitad (abajo)
  const H=padTop+courtH+10;
  const colW=courtW/3;

  // Mi campo (abajo): fila junto a la red (zonas 4,3,2), fila 3m (7,8,9), fondo (5,6,1)
  // r=0 es junto a la red (arriba de mi mitad), r=2 es el fondo (abajo)
  const myZone={4:[0,0],3:[1,0],2:[2,0],7:[0,1],8:[1,1],9:[2,1],5:[0,2],6:[1,2],1:[2,2]};
  function myXY(z){const [c,r]=myZone[z]||[1,0];return [cx0+c*colW+colW/2, myTop+r*(halfH/3)+(halfH/3)/2];}
  // Campo rival (arriba): zonas 2,3,4 junto a la red (abajo de su mitad, r=1), fondo 5,6,1 (arriba, r=0)
  const rivZone={2:[0,1],3:[1,1],4:[2,1],1:[0,0],6:[1,0],5:[2,0],7:[0,0],8:[1,0],9:[2,0]};
  function rivXY(z){const [c,r]=rivZone[z]||[1,1];return [cx0+c*colW+colW/2, cy0+r*(halfH/2)+(halfH/2)/2];}

  // === Métricas (como la referencia: Tot, Pts%, E%, Err%, Blo%) ===
  const tot=atks.length;
  const pt=atks.filter(r=>r.ev==='#').length;
  const er=atks.filter(r=>r.ev==='=').length;   // error propio
  const bl=atks.filter(r=>r.ev==='/').length;    // bloqueado
  const pctPt=tot?Math.round(pt/tot*100):0;
  const pctE=tot?Math.round((pt)/tot*100):0;     // E = eficacia/efectividad de punto
  const pctErr=tot?Math.round(er/tot*100):0;
  const pctBlo=tot?Math.round(bl/tot*100):0;

  const NET='#1f2937', LINE='#9ca3af', SUB='#9ca3af';
  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto">`;

  // === Datos arriba (2 bloques, como la foto) ===
  const lblX=cx0, val1X=cx0+78, lbl2X=cx0+88, val2X=cx0+courtW;
  const dCol='#7c9cb5';
  svg+=`<text x="${lblX}" y="${16}" font-size="10" fill="${dCol}">Tot:</text><text x="${val1X}" y="${16}" font-size="10" font-weight="700" fill="#374151" text-anchor="end">${tot}</text>`;
  svg+=`<text x="${lblX}" y="${28}" font-size="10" fill="${dCol}">Pts:</text><text x="${val1X}" y="${28}" font-size="10" font-weight="700" fill="#374151" text-anchor="end">${pctPt}%</text>`;
  svg+=`<text x="${lbl2X}" y="${16}" font-size="10" fill="${dCol}">E:</text><text x="${val2X}" y="${16}" font-size="10" font-weight="700" fill="#374151" text-anchor="end">${pctE}%</text>`;
  svg+=`<text x="${lbl2X}" y="${28}" font-size="10" fill="${dCol}">Err:</text><text x="${val2X}" y="${28}" font-size="10" font-weight="700" fill="#374151" text-anchor="end">${pctErr}%</text>`;
  svg+=`<text x="${lbl2X}" y="${40}" font-size="10" fill="${dCol}">Blo:</text><text x="${val2X}" y="${40}" font-size="10" font-weight="700" fill="#374151" text-anchor="end">${pctBlo}%</text>`;
  // codigo de salida abajo a la izquierda de los datos
  svg+=`<text x="${lblX}" y="${44}" font-size="13" font-weight="800" fill="#111">${label}</text>`;

  // === Cancha ===
  // Cada media cancha = 9m. La línea de ataque (3m) está a 1/3 de la red.
  const third=halfH/3;  // 3 metros en proporción
  svg+=`<rect x="${cx0}" y="${cy0}" width="${courtW}" height="${courtH}" fill="#fff" stroke="${LINE}" stroke-width="1.5"/>`;
  // red (linea negra gruesa al medio)
  svg+=`<line x1="${cx0}" y1="${netY}" x2="${cx0+courtW}" y2="${netY}" stroke="${NET}" stroke-width="3"/>`;
  // linea de 3m del rival (arriba): a 3m de la red hacia su fondo
  const riv3m=netY-third;
  svg+=`<line x1="${cx0}" y1="${riv3m}" x2="${cx0+courtW}" y2="${riv3m}" stroke="${LINE}" stroke-width="1"/>`;
  // linea de 3m mi campo (abajo): a 3m de la red hacia mi fondo
  const my3m=netY+third;
  svg+=`<line x1="${cx0}" y1="${my3m}" x2="${cx0+courtW}" y2="${my3m}" stroke="${LINE}" stroke-width="1"/>`;
  // subzonas punteadas en AMBAS mitades (zona de defensa, entre la línea de 3m y el fondo)
  // verticales que dividen las 3 columnas, en cada zaga
  [cx0+colW, cx0+colW*2].forEach(x=>{
    svg+=`<line x1="${x}" y1="${my3m}" x2="${x}" y2="${myBot}" stroke="${SUB}" stroke-width="0.6" stroke-dasharray="3 2"/>`;   // mi zaga
    svg+=`<line x1="${x}" y1="${cy0}" x2="${x}" y2="${riv3m}" stroke="${SUB}" stroke-width="0.6" stroke-dasharray="3 2"/>`;     // zaga rival
  });
  // horizontal media de cada zaga
  svg+=`<line x1="${cx0}" y1="${(my3m+myBot)/2}" x2="${cx0+courtW}" y2="${(my3m+myBot)/2}" stroke="${SUB}" stroke-width="0.6" stroke-dasharray="3 2"/>`;
  svg+=`<line x1="${cx0}" y1="${(cy0+riv3m)/2}" x2="${cx0+courtW}" y2="${(cy0+riv3m)/2}" stroke="${SUB}" stroke-width="0.6" stroke-dasharray="3 2"/>`;

  if(atkState.vista==='heatmap'){
    const destCount={}; atks.forEach(r=>{if(r.dz)destCount[r.dz]=(destCount[r.dz]||0)+1;});
    const maxD=Math.max(...Object.values(destCount),1);
    const cellsByPos={};
    Object.entries(rivZone).forEach(([z,cr])=>{ if(['1','2','3','4','5','6'].includes(z)){const k=cr.join(',');cellsByPos[k]=(cellsByPos[k]||0)+(destCount[z]||0);} });
    [[0,0],[1,0],[2,0],[0,1],[1,1],[2,1]].forEach(([c,r])=>{
      const cnt=cellsByPos[[c,r].join(',')]||0;
      const a=cnt/maxD, x=cx0+c*colW, y=cy0+r*(halfH/2);
      svg+=`<rect x="${x}" y="${y}" width="${colW}" height="${halfH/2}" fill="rgba(220,38,38,${a*0.8})" stroke="${LINE}" stroke-width="0.3"/>`;
      if(cnt>0) svg+=`<text x="${x+colW/2}" y="${y+halfH/4+4}" text-anchor="middle" font-size="12" font-weight="700" fill="${a>0.5?'#fff':'#7f1d1d'}">${cnt}</text>`;
    });
  } else {
    // Color + marcador por RESULTADO: # punto (verde ▲), = // error (rojo ✕), +/- sigue (negro ●)
    function resultado(ev){ if(ev==='#')return 'punto'; if(ev==='='||ev==='/')return 'error'; return 'sigue'; }
    const COL={punto:'#16a34a',error:'#dc2626',sigue:'#111'};
    const origins=new Set();
    const destSeen={};
    atks.forEach(r=>{
      if(!r.dz) return;
      const res=resultado(r.ev), col=COL[res];
      const [x1,y1]=myXY(r.oz);
      let [x2,y2]=rivXY(r.dz);
      // jitter radial para separar marcadores en la misma zona
      const k=r.oz+'>'+r.dz; const n=(destSeen[k]=(destSeen[k]||0)+1);
      if(n>1){const ang=n*1.3;x2+=Math.cos(ang)*7;y2+=Math.sin(ang)*7;}
      const dash = (r.hs==='S') ? ' stroke-dasharray="5 4"' : '';
      if(r.ev==='='){
        // error: se fue afuera -> extender la recta hasta fuera del fondo rival, X afuera
        const yOut=cy0-9, t=(yOut-y1)/((y2-y1)||-1), xOut=x1+(x2-x1)*t;
        svg+=`<line x1="${x1}" y1="${y1}" x2="${xOut}" y2="${yOut}" stroke="${col}" stroke-width="1.4" opacity="0.7"${dash}/>`;
        svg+=`<path d="M${xOut-3.5},${yOut-3.5} L${xOut+3.5},${yOut+3.5} M${xOut+3.5},${yOut-3.5} L${xOut-3.5},${yOut+3.5}" stroke="${col}" stroke-width="2.2" stroke-linecap="round"/>`;
      } else if(r.ev==='/'){
        // bloqueado: cae de nuestro lado -> cortar en la red, X de nuestro lado
        const t=(netY-y1)/((y2-y1)||-1), xNet=x1+(x2-x1)*t, yb=netY+8;
        svg+=`<line x1="${x1}" y1="${y1}" x2="${xNet}" y2="${netY}" stroke="${col}" stroke-width="1.4" opacity="0.7"${dash}/>`;
        svg+=`<path d="M${xNet-3.5},${yb-3.5} L${xNet+3.5},${yb+3.5} M${xNet+3.5},${yb-3.5} L${xNet-3.5},${yb+3.5}" stroke="${col}" stroke-width="2.2" stroke-linecap="round"/>`;
      } else {
        svg+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="1.4" opacity="0.7"${dash}/>`;
        if(res==='punto'){
          svg+=`<path d="M${x2},${y2-5} L${x2+4.5},${y2+3.5} L${x2-4.5},${y2+3.5} Z" fill="${col}"/>`;
        } else {
          svg+=`<circle cx="${x2}" cy="${y2}" r="3.8" fill="${col}"/>`;
        }
      }
      origins.add(r.oz);
    });
    // origen: marca sobre la red (de donde ataca)
    origins.forEach(z=>{const [ox,oy]=myXY(z);svg+=`<circle cx="${ox}" cy="${oy}" r="3.5" fill="#16a34a"/>`;});
  }
  svg+=`</svg>`;

  return`<div class="chart-card" style="padding:10px 8px;display:flex;justify-content:center">${svg}</div>`;
}

function atkSet(k,v){atkState[k]=v;renderAtacantes();}
function atkToggleSet(n){const i=atkState.sets.indexOf(n);if(i>=0)atkState.sets.splice(i,1);else atkState.sets.push(n);renderAtacantes();}

// ===== SAQUE Y RECEPCION =====
let srState={vista:'saque',jugador:'Todos',sets:[1,2,3,4,5]};

function renderSaqueRec(){
  const el=document.getElementById('tab-saquerec');
  // Filtrable por los partidos seleccionados arriba (sel). Fuente: .dvw.
  const selNames=sel.map(i=>partidos[i]&&('vs '+partidos[i].rival));
  const bloques=SR.filter(p=>selNames.includes(p.partido));
  const saques=bloques.flatMap(p=>p.saques);
  const recs=bloques.flatMap(p=>p.recepciones);
  const jugSaq=['Todos',...[...new Set(saques.map(s=>s.j))].sort()];
  const jugRec=['Todos',...[...new Set(recs.map(r=>r.j))].sort()];
  const jugadores=srState.vista==='saque'?jugSaq:jugRec;

  const jugOpts=jugadores.map(j=>`<option value="${j}" ${j===srState.jugador?'selected':''}>${j}</option>`).join('');
  const setChecks=[1,2,3,4,5].map(n=>`<label class="dd-chk"><input type="checkbox" ${srState.sets.includes(n)?'checked':''} onchange="srToggleSet(${n})"> Set ${n}</label>`).join('');

  let body='';
  if(srState.vista==='saque'){
    let f=saques.filter(s=>srState.sets.includes(s.set));
    if(srState.jugador!=='Todos') f=f.filter(s=>s.j===srState.jugador);
    body=srSaqueView(f);
  } else {
    let f=recs.filter(r=>srState.sets.includes(r.set));
    if(srState.jugador!=='Todos') f=f.filter(r=>r.j===srState.jugador);
    body=srRecView(f);
  }

  el.innerHTML=`
    <p class="st">Saque y Recepción</p>
    <p class="leg" style="margin-top:-8px;margin-bottom:16px">
      ${srState.vista==='saque'
        ? 'A qué zona de la cancha rival fue cada saque y cómo lo recibió el rival. Sirve para definir el plan de saque: a qué zona conviene sacar para complicar la recepción del rival. <strong>Línea llena = saque potente (en salto)</strong> · <strong>línea punteada = flotado</strong>.'
        : 'A qué zona de tu cancha llegó cada recepción y con qué calidad. Muestra quién recibe, dónde, y a quién le conviene sacar al rival.'}
      <strong>Dato del scout .dvw — filtrable por los partidos seleccionados arriba (Náutico, Sonder A, CITTA, Cevils, NCSA B).</strong>
    </p>
    <div class="arm-filters">
      <div class="arm-filter-group">
        <label class="arm-label">Vista</label>
        <select onchange="srSet('vista',this.value)" class="arm-select">
          <option value="saque" ${srState.vista==='saque'?'selected':''}>Nuestro saque</option>
          <option value="recepcion" ${srState.vista==='recepcion'?'selected':''}>Nuestra recepción</option>
        </select>
      </div>
      <div class="arm-filter-group">
        <label class="arm-label">Jugador</label>
        <select onchange="srSet('jugador',this.value)" class="arm-select">${jugOpts}</select>
      </div>
      <div class="arm-filter-group">
        <label class="arm-label">Sets</label>
        <div class="dd-checks">${setChecks}</div>
      </div>
    </div>
    ${body}
  `;
}

// Vista SAQUE: cancha de flechas (de donde sacamos -> donde cae) + cancha de zonas + tabla ampliada
function srSaqueView(f){
  if(!f.length) return '<div style="color:var(--muted)">Sin saques para este filtro.</div>';

  // ---- CANCHA 1: flechas (nuestro saque sale desde nuestro fondo) — misma estética que Atacantes ----
  const ft=f.filter(s=>s.oz&&s.dz);
  const cb=courtBase({padTop:20});
  const {W,H,cx0,cy0,courtW,courtH,colW,netY,myBot,rivXY}=cb;
  // origen del saque: nuestro fondo, según la columna de la zona de saque
  const serveCol={1:2,6:1,5:0,9:2,8:1,7:0};
  function serveXY(z){const c=serveCol[z]??1;return [cx0+c*colW+colW/2, myBot-6];}

  const evalScore={'#':4,'+':3,'!':2,'-':1,'=':0};
  function srvColor(avgRivalRec){
    if(avgRivalRec<=2) return '#16a34a';
    if(avgRivalRec<=2.8) return '#d97706';
    return '#dc2626';
  }
  const traj={};
  ft.forEach(s=>{
    const k=s.oz+'>'+s.dz+'>'+(s.hs||'H');
    if(!traj[k]) traj[k]={oz:s.oz,dz:s.dz,hs:(s.hs||'H'),tot:0,recScore:0,recN:0,ace:0};
    const t=traj[k]; t.tot++;
    if(s.ev==='#')t.ace++;
    if(s.rrec){t.recScore+=evalScore[s.rrec]??2;t.recN++;}
  });
  const maxT=Math.max(...Object.values(traj).map(t=>t.tot),1);

  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto"><defs><marker id="sah" markerWidth="9" markerHeight="9" refX="5.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/></marker></defs>`;
  svg+=cb.bg();
  svg+=`<text x="${cx0}" y="${cy0-4}" font-size="8" fill="#94a3b8" font-weight="600">CAMPO RIVAL — cae el saque</text>`;
  svg+=`<text x="${cx0}" y="${H-3}" font-size="8" fill="#94a3b8" font-weight="600">SACAMOS</text>`;
  Object.values(traj).forEach(t=>{
    const [x1,y1]=serveXY(t.oz);
    const [x2,y2]=rivXY(t.dz);
    const w=1.5+t.tot/maxT*4;
    const avgR=t.recN?t.recScore/t.recN:2.5;
    const col=srvColor(avgR);
    const dash = (t.hs==='S') ? ` stroke-dasharray="${(w*1.6).toFixed(1)} ${(w*1.4).toFixed(1)}"` : '';
    svg+=`<circle cx="${x1}" cy="${y1}" r="3" fill="${col}"/>`;
    svg+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${w}" opacity="0.6" marker-end="url(#sah)"${dash}/>`;
    const mx=(x1+x2)/2,my=(y1+y2)/2;
    svg+=`<circle cx="${mx}" cy="${my}" r="8" fill="#fff" stroke="${col}" stroke-width="1.5"/>`;
    svg+=`<text x="${mx}" y="${my+3}" text-anchor="middle" font-size="9" font-weight="700" fill="${col}">${t.tot}</text>`;
  });
  svg+=`</svg>`;

  // ---- CANCHA 2: zonas del rival con % recepcion comprometida (como antes) ----
  const byZ={};
  f.forEach(s=>{
    const z=s.dz||'?';
    if(!byZ[z]) byZ[z]={tot:0,ace:0,err:0,rPerf:0,rPos:0,rReg:0,rMala:0,rVend:0,rErr:0};
    const c=byZ[z]; c.tot++;
    if(s.ev==='#')c.ace++; if(s.ev==='=')c.err++;
    if(s.rrec==='#')c.rPerf++; else if(s.rrec==='+')c.rPos++; else if(s.rrec==='!')c.rReg++;
    else if(s.rrec==='-')c.rMala++; else if(s.rrec==='/')c.rVend++; else if(s.rrec==='=')c.rErr++;
  });
  const W2=300,pad=6,cellW2=(W2-pad*2)/3,cellH2=(210-pad*2)/2,H2=210;
  const rivZ2={2:[0,1],3:[1,1],4:[2,1],1:[0,0],6:[1,0],5:[2,0]};
  const maxT2=Math.max(...Object.values(byZ).map(c=>c.tot),1);
  let svg2=`<svg width="${W2}" height="${H2}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto">`;
  svg2+=`<rect x="0" y="0" width="${W2}" height="${H2}" fill="#fff" stroke="#9ca3af" stroke-width="1.5" rx="4"/>`;
  svg2+=`<line x1="0" y1="${H2-pad}" x2="${W2}" y2="${H2-pad}" stroke="#1f2937" stroke-width="3"/>`;
  svg2+=`<text x="${W2-4}" y="${H2-pad-4}" text-anchor="end" font-size="9" fill="#9ca3af">RED</text>`;
  [[0,0],[1,0],[2,0],[0,1],[1,1],[2,1]].forEach(([c,r])=>{
    let zlbl='',cnt=0,bad=0;
    Object.entries(rivZ2).forEach(([z,cr])=>{ if(cr[0]===c&&cr[1]===r){zlbl=z; if(byZ[z]){cnt=byZ[z].tot;bad=byZ[z].rMala+byZ[z].rVend+byZ[z].rErr;}} });
    const x=pad+c*cellW2,y=pad+r*cellH2,a=cnt/maxT2;
    svg2+=`<rect x="${x}" y="${y}" width="${cellW2-1}" height="${cellH2-1}" fill="rgba(124,58,237,${a*0.6})" stroke="#cbd5e1" stroke-width="0.5"/>`;
    svg2+=`<text x="${x+5}" y="${y+13}" font-size="9" fill="${a>0.4?'#fff':'#7c3aed'}" font-weight="600">Z${zlbl}</text>`;
    if(cnt>0){
      svg2+=`<text x="${x+cellW2/2}" y="${y+cellH2/2}" text-anchor="middle" font-size="18" font-weight="700" fill="${a>0.4?'#fff':'#4c1d95'}">${cnt}</text>`;
      const pctBad=Math.round(bad/cnt*100);
      svg2+=`<text x="${x+cellW2/2}" y="${y+cellH2/2+14}" text-anchor="middle" font-size="9" fill="${a>0.4?'#e9d5ff':'#7c3aed'}">${pctBad}% mala</text>`;
    }
  });
  svg2+=`</svg>`;

  // ---- TABLA ampliada: todos los tipos de recepcion del rival por zona ----
  const rows=Object.entries(byZ).filter(([z])=>z!=='?').sort((a,b)=>b[1].tot-a[1].tot).map(([z,c])=>{
    return `<tr><td>Z${z}</td><td><strong>${c.tot}</strong></td><td>${c.ace}</td>
      <td class="ph">${c.rPerf}</td><td>${c.rPos}</td><td>${c.rReg}</td><td>${c.rMala}</td><td>${c.rVend}</td><td class="pl">${c.rErr}</td></tr>`;
  }).join('');

  return `
  <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">
    <div class="chart-card" style="flex:0 0 auto">
      <div class="chart-title">De dónde sacamos → dónde cae</div>
      <div class="chart-subtitle" style="margin-bottom:14px">Sacamos desde fuera de la cancha. Grosor = volumen · color = qué tan mal recibió el rival (verde = recibió mal, bueno para nosotros).</div>
      ${svg}
    </div>
    <div class="chart-card" style="flex:0 0 auto">
      <div class="chart-title">Zonas del rival — volumen y daño</div>
      <div class="chart-subtitle" style="margin-bottom:14px">Color = volumen de saques. "% mala" = recepción comprometida (mala+vendida+error).</div>
      ${svg2}
    </div>
    <div class="chart-card" style="flex:1;min-width:340px">
      <div class="chart-title">Recepción del rival por zona — detalle</div>
      <div class="table-wrap" style="margin-top:10px"><table>
        <thead><tr><th>Zona</th><th>Saques</th><th>Aces</th>
          <th class="ph">Perf</th><th>Pos</th><th>Adm</th><th>Neg</th><th>Vend</th><th class="pl">Err</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p class="leg" style="margin-top:10px">Perf=perfecta · Pos=positiva · Adm=admiración · Neg=negativa · Vend=vendida · Err=error del rival al recibir. Cuanto más a la derecha, peor recibió el rival = mejor saque nuestro.</p>
    </div>
  </div>`;
}

// Vista RECEPCION: cancha entera, flechas del saque entrante (origen rival -> destino tu campo)
function srRecView(f){
  if(!f.length) return '<div style="color:var(--muted)">Sin recepciones para este filtro.</div>';
  const ft=f.filter(r=>r.oz&&r.dz);  // con trayectoria

  // misma estética que Atacantes (courtBase). El saque rival nace en su fondo (arriba), recibimos abajo.
  const cb=courtBase({padTop:20});
  const {W,H,cx0,cy0,courtW,courtH,colW,netY,myXY}=cb;
  // ORIGEN del saque rival: en el fondo del campo rival (arriba), por columna
  const serveCol={1:0,6:1,5:2,9:0,8:1,7:2,2:0,3:1,4:2};
  function serveXY(z){const c=serveCol[z]??1;return [cx0+c*colW+colW/2, cy0+6];}

  const evalScore={'#':4,'+':3,'!':2,'-':1,'=':0};
  function qColor(avg){if(avg>=3)return '#16a34a';if(avg>=2)return '#d97706';return '#dc2626';}

  const traj={};
  ft.forEach(r=>{
    const k=r.oz+'>'+r.dz;
    if(!traj[k]) traj[k]={oz:r.oz,dz:r.dz,tot:0,scoreSum:0,perf:0,err:0};
    const t=traj[k]; t.tot++; t.scoreSum+=evalScore[r.ev]??2;
    if(r.ev==='#')t.perf++; if(r.ev==='=')t.err++;
  });
  const maxT=Math.max(...Object.values(traj).map(t=>t.tot),1);

  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto"><defs><marker id="rah" markerWidth="9" markerHeight="9" refX="5.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/></marker></defs>`;
  svg+=cb.bg();
  svg+=`<text x="${cx0}" y="${cy0-4}" font-size="8" fill="#94a3b8" font-weight="600">SAQUE RIVAL</text>`;
  svg+=`<text x="${cx0}" y="${H-3}" font-size="8" fill="#94a3b8" font-weight="600">TU CAMPO — recibís</text>`;

  Object.values(traj).forEach(t=>{
    const [x1,y1]=serveXY(t.oz);
    const [x2,y2]=myXY(t.dz);
    const w=1.5+t.tot/maxT*4;
    const avg=t.scoreSum/t.tot;
    const col=qColor(avg);
    svg+=`<circle cx="${x1}" cy="${y1}" r="3" fill="${col}"/>`;
    svg+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${w}" opacity="0.6" marker-end="url(#rah)"/>`;
    const mx=(x1+x2)/2,my=(y1+y2)/2;
    svg+=`<circle cx="${mx}" cy="${my}" r="8" fill="#fff" stroke="${col}" stroke-width="1.5"/>`;
    svg+=`<text x="${mx}" y="${my+3}" text-anchor="middle" font-size="9" font-weight="700" fill="${col}">${t.tot}</text>`;
  });
  svg+=`</svg>`;

  // tabla por jugador
  const byJ={};
  f.forEach(r=>{ if(!byJ[r.j])byJ[r.j]={tot:0,perf:0,pos:0,err:0}; const c=byJ[r.j];c.tot++;if(r.ev==='#')c.perf++;else if(r.ev==='+')c.pos++;else if(r.ev==='=')c.err++;});
  const rows=Object.entries(byJ).sort((a,b)=>b[1].tot-a[1].tot).map(([j,c])=>{
    const pos=Math.round((c.perf+c.pos)/c.tot*100);
    return `<tr><td>${j}</td><td>${c.tot}</td><td>${c.perf}</td><td>${c.err}</td><td><span class="${pos>=60?'ph':pos>=45?'pm':'pl'}">${pos}%</span></td></tr>`;
  }).join('');

  return `
  <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start">
    <div class="chart-card" style="flex:0 0 auto">
      <div class="chart-title">Saque entrante → dónde recibimos</div>
      <div class="chart-subtitle" style="margin-bottom:14px">Flecha desde la zona del rival que saca hasta dónde cae en tu campo. Grosor = volumen · color = calidad de tu recepción (verde buena, amarillo regular, rojo mala).</div>
      ${svg}
    </div>
    <div class="chart-card" style="flex:1;min-width:280px">
      <div class="chart-title">Recepción por jugador</div>
      <div class="table-wrap" style="margin-top:10px"><table>
        <thead><tr><th>Jugador</th><th>Rec</th><th>Perfectas</th><th>Errores</th><th>% positiva</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p class="leg" style="margin-top:10px">${ft.length} recepciones con trayectoria del saque. El ángulo importa: un saque de Z5→Z1 (cruzado) no es lo mismo que Z6→Z6 (frontal) aunque caigan cerca.</p>
    </div>
  </div>`;
}

function srSet(k,v){if(k==='vista'){srState.vista=v;srState.jugador='Todos';}else{srState[k]=v;}renderSaqueRec();}
function srToggleSet(n){const i=srState.sets.indexOf(n);if(i>=0)srState.sets.splice(i,1);else srState.sets.push(n);renderSaqueRec();}

// ===== COORDENADAS EXACTAS =====
let coordState={fund:'Ataque',jugador:'Todos',sets:[1,2,3,4,5]};

function coordEvColor(ev){
  if(ev==='#')return '#16a34a';
  if(ev==='+')return '#65a30d';
  if(ev==='!')return '#d97706';
  if(ev==='-')return '#ef4444';
  if(ev==='/')return '#dc2626';
  if(ev==='=')return '#991b1b';
  return '#64748b';
}

// Dibuja una cancha de coordenadas con la MISMA estética que Atacantes (courtBase).
// mode: 'normal' (ataque), 'saque' (origen fuera abajo), 'recepcion' (rival saca fuera arriba),
//       'defensa' (ataque rival nace dentro del campo rival arriba, defendemos abajo)
function coordCourt(acc, titulo, mode){
  const invert = (mode==='recepcion'||mode==='defensa');
  const cb=courtBase({padTop:24});
  const {W,H,cx0,cy0,courtW,courtH,netY,myBot,xyToCanvas}=cb;
  // outBand: franja fuera de la cancha para saque/recepción
  const outBand=(mode==='saque'||mode==='recepcion')?20:0;

  let g='', lines='', dots='';
  acc.forEach(r=>{
    let [x1,y1]=xyToCanvas(r.ox, r.oy, invert);
    let [x2,y2]=xyToCanvas(r.dx, r.dy, invert);
    if(mode==='saque' && r.oy<50){ y1=myBot-3; }            // sacamos desde nuestro fondo
    if(mode==='recepcion'){ y1=cy0+3; }                      // saque rival nace arriba
    const col=coordEvColor(r.ev);
    g+=`<circle cx="${x1}" cy="${y1}" r="10" fill="${col}" opacity="0.13"/>`;
    g+=`<circle cx="${x2}" cy="${y2}" r="12" fill="${col}" opacity="0.16"/>`;
    lines+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#334155" stroke-width="1" opacity="0.5"/>`;
    dots+=`<circle cx="${x1}" cy="${y1}" r="3" fill="#fff" stroke="${col}" stroke-width="1.5"/>`;
    dots+=`<circle cx="${x2}" cy="${y2}" r="3.5" fill="${col}"/>`;
  });

  let topLabel='CAMPO RIVAL', botLabel='TU CAMPO';
  if(mode==='saque'){ botLabel='SACAMOS'; }
  if(mode==='recepcion'){ topLabel='SAQUE RIVAL'; botLabel='RECIBIMOS'; }
  if(mode==='defensa'){ topLabel='ATAQUE RIVAL'; botLabel='DEFENDEMOS'; }

  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto">`;
  svg+=cb.bg();
  svg+=`<text x="${cx0}" y="${cy0-4}" font-size="8" fill="#94a3b8" font-weight="600">${topLabel}</text>`;
  svg+=`<text x="${cx0}" y="${H-3}" font-size="8" fill="#94a3b8" font-weight="600">${botLabel}</text>`;
  svg+=g+lines+dots;
  svg+=`</svg>`;

  return`
    <div class="chart-card" style="flex:0 0 auto;padding:10px 8px">
      <div class="chart-title" style="font-size:12px">${titulo}</div>
      <div class="chart-subtitle" style="margin-bottom:8px;font-size:10px">${acc.length} acciones</div>
      ${svg}
    </div>`;
}

function renderCoords(){
  const el=document.getElementById('tab-coords');
  const selNames=sel.map(i=>partidos[i]&&('vs '+partidos[i].rival));
  const recs=COORD.flatMap(p=>p.records.map(r=>({...r,partido:p.partido})))
    .filter(r=>selNames.includes(r.partido));
  const funds=['Ataque','Saque','Recepción','Defensa'].filter(fn=>recs.some(r=>r.f===fn));
  const fundOptsList=['Todos',...funds];
  const jugadores=['Todos',...[...new Set(recs.map(r=>r.j))].sort()];

  let f=recs.filter(r=>coordState.sets.includes(r.set));
  if(coordState.fund!=='Todos') f=f.filter(r=>r.f===coordState.fund);
  if(coordState.jugador!=='Todos') f=f.filter(r=>r.j===coordState.jugador);

  const esAtaque = coordState.fund==='Ataque';
  // modo de dibujo segun fundamento
  let mode='normal';
  if(coordState.fund==='Saque') mode='saque';
  else if(coordState.fund==='Recepción') mode='recepcion';
  else if(coordState.fund==='Defensa') mode='defensa';

  let canchasHTML;
  let resumenLinea;
  if(esAtaque){
    const so=f.filter(r=>r.fase==='so');
    const contra=f.filter(r=>r.fase==='trans');
    canchasHTML = coordCourt(so,'Side-out','normal') + coordCourt(contra,'Contraataque','normal');
    resumenLinea = `${f.length} acciones — ${so.length} side-out · ${contra.length} contraataque`;
  } else {
    canchasHTML = coordCourt(f, coordState.fund==='Todos'?'Todas las acciones':coordState.fund, mode);
    resumenLinea = `${f.length} acciones con coordenadas`;
  }

  const fundOpts=fundOptsList.map(x=>`<option value="${x}" ${x===coordState.fund?'selected':''}>${x}</option>`).join('');
  const jugOpts=jugadores.map(x=>`<option value="${x}" ${x===coordState.jugador?'selected':''}>${x}</option>`).join('');
  const setChecks=[1,2,3,4,5].map(n=>`<label class="dd-chk"><input type="checkbox" ${coordState.sets.includes(n)?'checked':''} onchange="coordToggleSet(${n})"> Set ${n}</label>`).join('');

  const evNames={'#':'Punto/Perfecta','+':'Positiva','!':'Admiración','-':'Negativa','/':'Bloq/Vendida','=':'Error'};
  const evCount={}; f.forEach(r=>evCount[r.ev]=(evCount[r.ev]||0)+1);
  const evLegend=Object.entries(evNames).filter(([k])=>evCount[k]).map(([k,v])=>
    `<div style="display:flex;align-items:center;gap:6px;font-size:11px"><span style="width:10px;height:10px;border-radius:50%;background:${coordEvColor(k)};display:inline-block"></span>${v} (${evCount[k]})</div>`
  ).join('');

  el.innerHTML=`
    <p class="st">Coordenadas exactas — Side-out vs Contraataque</p>
    <p class="leg" style="margin-top:-8px;margin-bottom:16px">
      Acciones en su <strong>punto exacto</strong> de la cancha. Cancha izquierda = side-out (1er ataque tras recepción), derecha = contraataque (durante el rally). Círculo hueco = origen, lleno = destino, con halo de color por resultado.
      <strong>Solo partidos con coordenadas en el .dvw (hoy CITTA): ${recs.length} acciones, casi todas Set 1.</strong> Con un scout completo se llenará como el software pro.
    </p>
    <div class="arm-filters">
      <div class="arm-filter-group">
        <label class="arm-label">Fundamento</label>
        <select onchange="coordSet('fund',this.value)" class="arm-select">${fundOpts}</select>
      </div>
      <div class="arm-filter-group">
        <label class="arm-label">Jugador</label>
        <select onchange="coordSet('jugador',this.value)" class="arm-select">${jugOpts}</select>
      </div>
      <div class="arm-filter-group">
        <label class="arm-label">Sets</label>
        <div class="dd-checks">${setChecks}</div>
      </div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px">Mostrando <strong>${resumenLinea}</strong></div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">
      ${canchasHTML}
      <div style="flex:1;min-width:160px">
        <div class="chart-card">
          <div class="chart-title">Referencias</div>
          <div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">${evLegend||'<span style="color:var(--muted);font-size:11px">Sin datos</span>'}</div>
          <div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><span style="width:9px;height:9px;border-radius:50%;background:#fff;border:1.5px solid #64748b;display:inline-block"></span>Origen</div>
            <div style="display:flex;align-items:center;gap:6px"><span style="width:9px;height:9px;border-radius:50%;background:#64748b;display:inline-block"></span>Destino</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function coordSet(k,v){coordState[k]=v;renderCoords();}
function coordToggleSet(n){const i=coordState.sets.indexOf(n);if(i>=0)coordState.sets.splice(i,1);else coordState.sets.push(n);renderCoords();}

function render(){
  renderMI();renderKPIs();
  if(curTab==='tabla')renderTabla();
  else if(curTab==='graficos')renderGraficos();
  else if(curTab==='rotaciones')renderRotaciones();
  else if(curTab==='armador')renderArmador();
  else if(curTab==='atacantes')renderAtacantes();
  else if(curTab==='saquerec')renderSaqueRec();
  else if(curTab==='coords')renderCoords();
  else renderEquipo();
}
render();
</script>
